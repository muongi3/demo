<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Khán Giả - Lost Island Livestream</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background: #050209; color: #fff; font-family: 'Outfit', sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #1b0a2a 0%, #050209 100%);
        }
        video { width: 100vw; height: 100vh; object-fit: contain; }
        
        #overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 4, 16, 0.85); padding: 20px 40px; border-radius: 12px; 
            border: 2px solid #bb33ff; color: #00f2ff; font-weight: bold; font-size: 20px;
            box-shadow: 0 0 30px rgba(187, 51, 255, 0.5); text-align: center; letter-spacing: 2px;
            animation: pulseGlow 1.5s infinite alternate;
        }
        
        @keyframes pulseGlow {
            from { box-shadow: 0 0 15px rgba(187, 51, 255, 0.3); }
            to { box-shadow: 0 0 35px rgba(0, 242, 255, 0.6); }
        }

        #ui-hud {
            position: absolute; top: 15px; left: 15px; display: none;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; border: 1px solid #bb33ff;
        }
        .live-badge {
            color: red; font-weight: 900; animation: blink 1s infinite; margin-bottom: 5px; font-size: 14px;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="overlay">ĐANG DÒ TÌM TÍN HIỆU NGƯỜI CHƠI...</div>
    
    <div id="ui-hud">
        <div class="live-badge">🔴 TRỰC TIẾP</div>
        <div style="font-size: 12px; color: #ccc;">Chế độ khán giả (Spectator)</div>
    </div>

    <video id="vid" autoplay playsinline></video>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        
        if (!roomId) {
            document.getElementById('overlay').innerText = 'LỖI: KHÔNG CÓ ID PHÒNG!\nHãy bấm vào đúng link trên Discord.';
            document.getElementById('overlay').style.color = 'red';
            document.getElementById('overlay').style.borderColor = 'red';
        } else {
            document.getElementById('overlay').innerText = 'ĐANG KẾT NỐI VỚI BẠN BÈ...';

            const peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            
            // Nhận luồng video từ người chơi
            peerConnection.ontrack = (event) => {
                document.getElementById('vid').srcObject = event.streams[0];
                document.getElementById('overlay').style.display = 'none'; // Ẩn bảng chờ
                document.getElementById('ui-hud').style.display = 'block'; // Hiện HUD live
            };

            // Lắng nghe tín hiệu trả về từ người chơi thông qua Ntfy (Kênh Serverless)
            const sse = new EventSource(`https://ntfy.sh/lostisland_client_${roomId}/sse`);
            sse.onmessage = async (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if(data.event === "message") {
                        const msg = JSON.parse(data.message);
                        if (msg.type === 'answer') {
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(msg.answer));
                            console.log("Đã nhận Answer, kết nối WebRTC thành công!");
                        } else if (msg.type === 'candidate') {
                            peerConnection.addIceCandidate(new RTCIceCandidate(msg.candidate));
                        }
                    }
                } catch(err) { console.error("Lỗi parse data:", err); }
            };

            // Gửi candidate giúp mạng xuyên thủng tường lửa NAT
            peerConnection.onicecandidate = (e) => {
                if (e.candidate) {
                    fetch(`https://ntfy.sh/lostisland_host_${roomId}`, {
                        method: 'POST', body: JSON.stringify({ type: 'candidate', candidate: e.candidate })
                    });
                }
            };

            // Chủ động tạo Offer gọi người chơi
            async function connectHost() {
                // Tạo một yêu cầu nhận video/audio
                peerConnection.addTransceiver('video', { direction: 'recvonly' });
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                // Bắn tín hiệu Offer lên kênh để máy người chơi nhận
                fetch(`https://ntfy.sh/lostisland_host_${roomId}`, {
                    method: 'POST', body: JSON.stringify({ type: 'offer', offer })
                });
            }
            
            // Đợi hệ thống sẵn sàng 1 giây rồi bắt đầu kết nối
            setTimeout(connectHost, 1000);
        }
    </script>
</body>
</html>
